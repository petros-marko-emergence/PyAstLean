name = "PastaLean"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["PastaLean", "py2lean"]
testDriver = "PastaLeanTest"

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`

[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.31.0"

[[require]]
name = "verso-slides"
scope = "leanprover"
rev = "v4.31.0"

[[lean_lib]]
name = "PastaLean"

[[lean_lib]]
name = "Libraries"

[[lean_lib]]
name = "PastaLeanTest"

[[lean_lib]]
name = "Slides"
srcDir = "docs/ppt"

[[lean_exe]]
name = "slides"
srcDir = "docs/ppt"
root = "SlidesMain"
supportInterpreter = true

[[lean_exe]]
name="py2lean"
supportInterpreter = true

[[lean_exe]]
name="palc"
supportInterpreter = true
